name: construction_inspector
description: Construction site inspection tool for architects and tradespeople.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend & Auth
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Audio recording & playback
  record: ^6.0.0
  just_audio: ^0.9.39
  audio_waveforms: ^1.0.5

  # Camera / Photos
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1


  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
